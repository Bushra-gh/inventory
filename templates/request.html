<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request for Product</title>
    <link rel ="stylesheet" href ="/static/style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" 
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        #form-body{
            height: 370px;
            margin-top: 215px;
            width: 400px;
        }
    </style>
</head>
<body>
    <div id="main">
        <div id="canvas">
            <div id="form-body">
                <h2> Create a new Request </h2>
                <form action="">
                    <div class="mb-3">
                        <label for="name" class="form-label">Product Name</label>
                        <input class="form-control" type="text" value="Product Name" aria-label="Disabled input example" disabled readonly>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Product Category</label>
                        <input class="form-control" type="text" value="Category Name" aria-label="Disabled input example" disabled readonly>
                    </div>
                    <div class="mb-3">
                        <label for="qu" class="form-label">Units Required</label>
                        <input type="number" class="form-control" id="qu" >
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Request"> <br>
                    </div>    
                </form>
            </div>
        </div>
    </div>
</body>
</html>
